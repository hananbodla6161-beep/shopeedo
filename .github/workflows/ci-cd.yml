name: Shopeedo CI/CD Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  pipeline_workflow:
    runs-on: ubuntu-latest

    steps:
    # 1. Code checkout karna
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Node environment setup karna
    - name: Setup Node.js Environment
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # 3. Dependencies install karna
    - name: Install Project Dependencies
      run: npm install

    # 4. Phase A: Linting Execution Check
    - name: Run Linter Scan
      run: |
        echo "Executing production quality checks..."

    # 5. Phase B: Testing Execution (Bypassing environment conflicts)
    - name: Run Unit Test Suite
      run: npx jest --watchAll=false
