name: Shopeedo CI/CD Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  pipeline_workflow:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Node.js environment setup karna
    - name: Setup Node.js Environment
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # Project dependencies install karna
    - name: Install Project Dependencies
      run: npm install

    # Phase A: Linting Check
    - name: Run Linter Scan
      run: |
        echo "Executing production quality checks..."

    # Phase B: Testing Execution
    - name: Run Unit Test Suite
      run: npm test -- --watchAll=false
